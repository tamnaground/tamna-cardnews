<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 돌돌이 — 현무암 돌멩이. 찐빵형 1덩이(가로:세로 1:0.75) + 이끼 베레모 -->

  <!-- 그림자 -->
  <ellipse cx="200" cy="330" rx="120" ry="18" fill="#3E3226" opacity="0.10"/>

  <!-- 몸통 (찐빵형 현무암) -->
  <path d="M200 150
           C118 150 78 210 78 258
           C78 306 130 324 200 324
           C270 324 322 306 322 258
           C322 210 282 150 200 150 Z"
        fill="#3E3226" stroke="#3E3226" stroke-width="6"/>

  <!-- 현무암 기공 (크림 점 4개) -->
  <circle cx="150" cy="290" r="5" fill="#F5EDDF"/>
  <circle cx="255" cy="285" r="4" fill="#F5EDDF"/>
  <circle cx="290" cy="248" r="4.5" fill="#F5EDDF"/>
  <circle cx="112" cy="242" r="4" fill="#F5EDDF"/>

  <!-- 이끼 베레모 (정수리 덮는 초록) -->
  <path d="M120 196
           C120 150 172 132 202 132
           C236 132 284 152 282 196
           C250 178 152 178 120 196 Z"
        fill="#BCD9A0" stroke="#3E3226" stroke-width="6" stroke-linejoin="round"/>
  <!-- 모자 음영 1면 -->
  <path d="M120 196 C152 182 250 182 282 196 C258 190 146 190 120 196 Z"
        fill="#2F7A3D"/>
  <circle cx="202" cy="128" r="9" fill="#2F7A3D" stroke="#3E3226" stroke-width="5"/>

  <!-- 반쯤 감긴 졸린 눈 (크림 선) -->
  <path d="M150 250 q18 12 36 0" fill="none" stroke="#F5EDDF" stroke-width="7" stroke-linecap="round"/>
  <path d="M216 250 q18 12 36 0" fill="none" stroke="#F5EDDF" stroke-width="7" stroke-linecap="round"/>
  <!-- 볼 -->
  <ellipse cx="150" cy="278" rx="16" ry="10" fill="#E8622D" opacity="0.8"/>
  <ellipse cx="252" cy="278" rx="16" ry="10" fill="#E8622D" opacity="0.8"/>
  <!-- 입 (작은 크림 선) -->
  <path d="M188 282 q14 6 28 0" fill="none" stroke="#F5EDDF" stroke-width="5" stroke-linecap="round"/>

  <!-- 빙떡 소품 (크림 말이) -->
  <g transform="translate(322 300)">
    <ellipse cx="0" cy="0" rx="30" ry="16" fill="#F5EDDF" stroke="#3E3226" stroke-width="5"/>
    <path d="M-14 -8 q0 16 0 16 M2 -10 q0 20 0 20 M16 -7 q0 14 0 14"
          fill="none" stroke="#3E3226" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M-30 0 a30 16 0 0 0 60 0" fill="none" stroke="#3E3226" stroke-width="4"/>
  </g>
</svg>
