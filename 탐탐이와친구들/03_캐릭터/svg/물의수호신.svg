<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 물의 수호신 — 물방울. 물결 머리꼭지·배 물결띠·팔 벌림·주변 방울. 민트아쿠아 원본 HEX -->
  <!-- 몸통 #A8DCD9 / 배 물결 #CDEDEA / 윤곽 #6FB8B2 / 뺨 홍조 #F2B8A0 / 눈 #4A3B30 -->

  <!-- 바닥 그림자 -->
  <ellipse cx="200" cy="366" rx="96" ry="14" fill="#3E3226" opacity="0.10"/>

  <!-- 주변 작은 물방울 입자 -->
  <path d="M64 168 C64 158 72 150 72 150 C72 150 80 158 80 168 C80 174 76 179 72 179 C68 179 64 174 64 168 Z" fill="#A8DCD9" stroke="#6FB8B2" stroke-width="3.5"/>
  <path d="M330 150 C330 142 337 135 337 135 C337 135 344 142 344 150 C344 155 341 159 337 159 C333 159 330 155 330 150 Z" fill="#A8DCD9" stroke="#6FB8B2" stroke-width="3.5"/>
  <circle cx="52" cy="248" r="7" fill="#CDEDEA" stroke="#6FB8B2" stroke-width="3"/>
  <circle cx="350" cy="238" r="8" fill="#CDEDEA" stroke="#6FB8B2" stroke-width="3"/>

  <!-- 양팔 활짝 (하이텐션) — 뒤에 깔리는 팔 -->
