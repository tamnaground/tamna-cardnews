  <path d="M132 226 Q92 196 78 150" fill="none" stroke="#A8DCD9" stroke-width="19" stroke-linecap="round"/>
  <path d="M268 226 Q308 196 322 150" fill="none" stroke="#A8DCD9" stroke-width="19" stroke-linecap="round"/>
  <circle cx="78" cy="150" r="14" fill="#A8DCD9" stroke="#6FB8B2" stroke-width="6"/>
  <circle cx="322" cy="150" r="14" fill="#A8DCD9" stroke="#6FB8B2" stroke-width="6"/>

  <!-- 볼터치 -->
  <ellipse cx="158" cy="232" rx="18" ry="12" fill="#F2B8A0"/>
  <ellipse cx="242" cy="232" rx="18" ry="12" fill="#F2B8A0"/>

  <!-- 눈 (반짝 동그란 눈) -->
  <circle cx="176" cy="212" r="11" fill="#4A3B30"/>
  <circle cx="224" cy="212" r="11" fill="#4A3B30"/>
  <circle cx="180" cy="208" r="3.6" fill="#fff"/>
  <circle cx="228" cy="208" r="3.6" fill="#fff"/>

  <!-- 활짝 웃는 입 -->
  <path d="M184 238 Q200 258 216 238 Z" fill="#4A3B30"/>
  <path d="M186 240 Q200 249 214 240" fill="#F2B8A0"/>
