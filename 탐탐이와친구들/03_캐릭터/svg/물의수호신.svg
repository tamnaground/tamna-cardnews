  <path d="M268 226 Q308 196 322 150" fill="none" stroke="#6FB8B2" stroke-width="30" stroke-linecap="round"/>

  <!-- 짧은 두 발 -->
  <ellipse cx="170" cy="352" rx="24" ry="15" fill="#A8DCD9" stroke="#6FB8B2" stroke-width="6"/>
  <ellipse cx="230" cy="352" rx="24" ry="15" fill="#A8DCD9" stroke="#6FB8B2" stroke-width="6"/>

  <!-- 물방울 몸통 (위 뾰족한 눈물방울, 머리꼭지가 물결처럼 살짝 흘러내림) -->
  <path d="M206 58
           C210 80 210 98 202 112
           C214 122 230 138 244 158
           C266 188 272 204 272 224
           C272 300 240 346 200 346
           C160 346 128 300 128 224
           C128 200 138 174 158 148
           C176 124 192 102 194 80
           C194 80 190 108 202 118
           C196 100 200 76 206 58 Z"
        fill="#A8DCD9" stroke="#6FB8B2" stroke-width="7" stroke-linejoin="round"/>

  <!-- 하이라이트 (물 광택) -->
  <ellipse cx="166" cy="188" rx="15" ry="28" fill="#CDEDEA" opacity="0.85" transform="rotate(-16 166 188)"/>

  <!-- 배 물결 무늬 띠 -->
  <path d="M134 268
           Q157 254 180 268 T226 268 T272 268
           L272 292
           Q249 306 226 292 T180 292 T134 292 Z"
        fill="#CDEDEA" stroke="#6FB8B2" stroke-width="5" stroke-linejoin="round"/>

