<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 서월이 — 서울에서 온 직박구리. 달걀형 통통 새(세로 살짝) + 큰 동그란 안경 -->

  <!-- 꼬리깃 3갈래 -->
  <g fill="#2563AC" stroke="#3E3226" stroke-width="5" stroke-linejoin="round">
    <path d="M182 320 l-26 56 l30 -14 Z"/>
    <path d="M200 326 l0 62 l22 -16 Z"/>
    <path d="M218 320 l30 50 l-22 -18 Z"/>
  </g>

  <!-- 다리 -->
  <path d="M182 330 l-6 26 M176 356 l-12 6 M176 356 l-12 -2" stroke="#F7C873" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M218 330 l6 26 M224 356 l12 6 M224 356 l12 -2" stroke="#F7C873" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- 몸통 (달걀형, 파랑 등) -->
  <ellipse cx="200" cy="228" rx="106" ry="118" fill="#2563AC" stroke="#3E3226" stroke-width="6"/>
  <!-- 배·얼굴 (크림) -->
  <path d="M200 130
           C150 130 118 190 118 250
           C118 316 158 344 200 344
           C242 344 282 316 282 250
           C282 190 250 130 200 130 Z"
        fill="#F5EDDF" stroke="#3E3226" stroke-width="5"/>

  <!-- 상단 뾰족 깃 1가닥 -->
  <path d="M186 120 l14 -46 l16 44 Z" fill="#1D5BB8" stroke="#3E3226" stroke-width="5" stroke-linejoin="round"/>

  <!-- 날개 (잎사귀형, 몸에 붙음) -->
  <path d="M112 214 q-40 20 -30 74 q28 -12 44 -30 Z" fill="#2563AC" stroke="#3E3226" stroke-width="5" stroke-linejoin="round"/>
  <path d="M288 214 q40 20 30 74 q-28 -12 -44 -30 Z" fill="#2563AC" stroke="#3E3226" stroke-width="5" stroke-linejoin="round"/>

  <!-- 큰 동그란 안경 (얼굴 폭 55~60%) -->
  <g stroke="#3E3226" stroke-width="6" fill="#F5EDDF">
    <circle cx="166" cy="212" r="42"/>
    <circle cx="234" cy="212" r="42"/>
  </g>
  <path d="M208 212 h-16" stroke="#3E3226" stroke-width="6"/>
  <!-- 눈 (안경 안) -->
  <circle cx="166" cy="214" r="9" fill="#3E3226"/>
  <circle cx="234" cy="214" r="9" fill="#3E3226"/>

  <!-- 부리 -->
  <path d="M186 262 l14 20 l14 -20 Z" fill="#F7C873" stroke="#3E3226" stroke-width="5" stroke-linejoin="round"/>
  <!-- 볼 -->
  <ellipse cx="126" cy="258" rx="16" ry="11" fill="#E8622D" opacity="0.85"/>
  <ellipse cx="274" cy="258" rx="16" ry="11" fill="#E8622D" opacity="0.85"/>

  <!-- 스프링 단어장 + 연필 (분홍 표지) -->
  <g transform="translate(300 300) rotate(12)">
    <rect x="-30" y="-24" width="52" height="60" rx="5" fill="#F2A9C4" stroke="#3E3226" stroke-width="5"/>
    <rect x="-22" y="-16" width="36" height="44" rx="3" fill="#F5EDDF" stroke="#3E3226" stroke-width="3.5"/>
    <path d="M-18 -6 h28 M-18 4 h28 M-18 14 h20" stroke="#3E3226" stroke-width="3" stroke-linecap="round"/>
    <g stroke="#3E3226" stroke-width="3">
      <path d="M-30 -18 l-8 0 M-30 -8 l-8 0 M-30 2 l-8 0 M-30 12 l-8 0 M-30 22 l-8 0"/>
    </g>
    <path d="M30 -34 l16 8 l-30 44 l-14 -6 Z" fill="#F7C873" stroke="#3E3226" stroke-width="4" stroke-linejoin="round"/>
    <path d="M2 12 l14 6" stroke="#3E3226" stroke-width="4"/>
  </g>
</svg>
