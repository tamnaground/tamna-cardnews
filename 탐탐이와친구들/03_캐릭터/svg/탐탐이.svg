<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 탐탐이 — 바람 정령. 크림 몽글 1덩어리 + 정수리 6잎 꽃 + 유리병 -->
  <defs>
    <g id="tamtam-flower">
      <!-- 6잎 꽃: 평상 잎 #F7C873, 시든 잎 1장은 점선 윤곽(잊혀가는 말) -->
      <g stroke="#3E3226" stroke-width="4" stroke-linejoin="round">
        <ellipse cx="0" cy="-30" rx="15" ry="24" fill="#F7C873"/>
        <ellipse cx="0" cy="-30" rx="15" ry="24" fill="#F7C873" transform="rotate(60)"/>
        <ellipse cx="0" cy="-30" rx="15" ry="24" fill="#F7C873" transform="rotate(120)"/>
        <ellipse cx="0" cy="-30" rx="15" ry="24" fill="#FFCC5C" transform="rotate(180)"/>
        <ellipse cx="0" cy="-30" rx="15" ry="24" fill="#F7C873" transform="rotate(240)"/>
        <ellipse cx="0" cy="-30" rx="15" ry="24" fill="#F5EDDF" stroke-dasharray="5 4" transform="rotate(300)"/>
      </g>
      <circle cx="0" cy="0" r="15" fill="#E8622D" stroke="#3E3226" stroke-width="4"/>
    </g>
  </defs>

  <!-- 줄기 -->
  <path d="M200 132 L200 165" stroke="#2F7A3D" stroke-width="7" stroke-linecap="round"/>
  <!-- 꽃 (정수리 중앙) -->
  <use href="#tamtam-flower" transform="translate(200 96)"/>

  <!-- 바람 꼬리 (하단 좌우) -->
  <path d="M110 320 q-45 6 -60 -18 q30 6 40 -14" fill="#F5EDDF" stroke="#3E3226" stroke-width="5" stroke-linejoin="round"/>
  <path d="M292 322 q42 10 58 -12 q-28 4 -38 -16" fill="#F5EDDF" stroke="#3E3226" stroke-width="5" stroke-linejoin="round"/>

  <!-- 몸통 (크림 몽글, 바닥 살짝 평평) -->
  <path d="M200 150
           C120 150 92 210 92 258
           C92 312 132 340 200 340
           C268 340 308 312 308 258
           C308 210 280 150 200 150 Z"
        fill="#F5EDDF" stroke="#3E3226" stroke-width="6"/>

  <!-- 팔 스텁 (유리병 안기) -->
  <path d="M150 288 q-22 10 -20 34" fill="none" stroke="#3E3226" stroke-width="6" stroke-linecap="round"/>
  <path d="M250 288 q22 10 20 34" fill="none" stroke="#3E3226" stroke-width="6" stroke-linecap="round"/>

  <!-- 눈 (무심한 반달) -->
  <path d="M158 250 q14 -14 28 0" fill="none" stroke="#3E3226" stroke-width="7" stroke-linecap="round"/>
  <path d="M214 250 q14 -14 28 0" fill="none" stroke="#3E3226" stroke-width="7" stroke-linecap="round"/>
  <!-- 볼 -->
  <ellipse cx="150" cy="272" rx="17" ry="11" fill="#E8622D" opacity="0.85"/>
  <ellipse cx="250" cy="272" rx="17" ry="11" fill="#E8622D" opacity="0.85"/>
  <!-- 입 -->
  <path d="M190 274 q10 8 20 0" fill="none" stroke="#3E3226" stroke-width="5" stroke-linecap="round"/>

  <!-- 코르크 유리병 (앞에 안김) -->
  <g transform="translate(200 322)">
    <rect x="-9" y="-40" width="18" height="12" rx="3" fill="#F7C873" stroke="#3E3226" stroke-width="4"/>
    <path d="M-16 -28 h32 a6 6 0 0 1 6 6 v22 a10 10 0 0 1 -10 10 h-24 a10 10 0 0 1 -10 -10 v-22 a6 6 0 0 1 6 -6 Z"
          fill="#F5EDDF" stroke="#3E3226" stroke-width="4"/>
    <circle cx="-4" cy="-6" r="3.2" fill="#FFCC5C"/>
    <circle cx="7" cy="2" r="2.6" fill="#FFCC5C"/>
    <circle cx="-8" cy="6" r="2.2" fill="#FFCC5C"/>
  </g>
</svg>
