<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="common.css">
<style>
  .lead{font-size:42px;font-weight:800;line-height:1.28;margin-top:2px;}
  .lead .hl{color:var(--orange);}
  .tam{width:248px;height:248px;margin-top:2px;}
  .tamcap{font-size:22px;font-weight:700;color:#8a7a63;margin-top:-8px;}
  .tamcap b{color:var(--ink);font-weight:800;font-size:25px;}
  .cast{display:flex;justify-content:center;align-items:flex-end;gap:10px;margin:14px 0 4px;width:100%;}
  .cast .c{display:flex;flex-direction:column;align-items:center;width:200px;}
  .cast img{width:168px;height:168px;}
  .cast .nm{font-size:22px;font-weight:800;margin-top:-4px;}
  .cast .role{font-size:17px;font-weight:600;color:#8a7a63;margin-top:2px;}
  .tagline{margin-top:16px;font-size:24px;font-weight:700;color:var(--green);
    background:var(--green2);border-radius:40px;padding:12px 30px;}
</style></head>
<body><div class="card">
  <div class="top"><h1>탐탐이와 친구들</h1></div>
  <div class="body">
    <img class="corner tl" src="flower.svg"><img class="corner tr" src="flower.svg">
    <div class="frame"></div>
    <div class="inner">
      <img class="tam" src="../../../03_캐릭터/svg/탐탐이.svg">
      <div class="lead">사라져가는 <span class="hl">제주어</span>를<br>지키는 <b>탐탐이</b>와 세 수호신</div>
      <div class="tamcap"><b>탐탐이</b> · 돌하르방 · 지키고 아는 자</div>
      <div class="cast">
        <div class="c"><img src="../../../03_캐릭터/svg/물의수호신.svg"><div class="nm">물의 수호신</div><div class="role">나르는 자</div></div>
        <div class="c"><img src="../../../03_캐릭터/svg/나무의수호신.svg"><div class="nm">나무의 수호신</div><div class="role">기르는 자</div></div>
        <div class="c"><img src="../../../03_캐릭터/svg/돌의수호신.svg"><div class="nm">돌의 수호신</div><div class="role">듣는 자</div></div>
      </div>
      <div class="tagline">무뚝뚝한데 다정한, 제주식 위로</div>
    </div>
  </div>
  <div class="credit">제주어 감수: 제주어연구소 감수 예정 · 수익의 5%는 제주어 보존 활동에 쓰입니다 · ⓒ탐탐이와 친구들</div>
  <div class="bottom"><span>@tamnaground</span></div>
</div></body></html>
