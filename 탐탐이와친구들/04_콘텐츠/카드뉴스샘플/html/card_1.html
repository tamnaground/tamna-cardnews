<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="common.css">
<style>
  .lead{font-size:44px;font-weight:800;line-height:1.28;margin-top:6px;}
  .lead .hl{color:var(--orange);}
  .desc{font-size:26px;font-weight:600;color:#6d5f4c;line-height:1.5;margin-top:18px;}
  .cast{display:flex;justify-content:center;align-items:flex-end;gap:2px;margin:10px 0 4px;width:100%;}
  .cast .c{display:flex;flex-direction:column;align-items:center;width:186px;}
  .cast img{width:172px;height:172px;}
  .cast .nm{font-size:23px;font-weight:800;margin-top:-6px;}
  .cast .role{font-size:16px;font-weight:600;color:#8a7a63;}
  .tam{width:250px;height:250px;}
  .tagline{margin-top:16px;font-size:24px;font-weight:700;color:var(--green);
    background:var(--green2);border-radius:40px;padding:12px 30px;}

<body><div class="card">
  <div class="top"><h1>탐탐이와 친구들</h1></div>
  <div class="body">
    <img class="corner tl" src="flower.svg"><img class="corner tr" src="flower.svg">
    <div class="frame"></div>
    <div class="inner">
      <img class="tam" src="../../../03_캐릭터/svg/탐탐이.svg">
      <div class="lead">사라져가는 <span class="hl">제주어</span>를<br>줍고 나르고 지키는 다섯 친구</div>
      <div class="cast">
        <div class="c"><img src="../../../03_캐릭터/svg/몽생이.svg"><div class="nm">몽생이</div><div class="role">나르는 자</div></div>
        <div class="c"><img src="../../../03_캐릭터/svg/돌돌이.svg"><div class="nm">돌돌이</div><div class="role">듣는 자</div></div>
        <div class="c"><img src="../../../03_캐릭터/svg/서월이.svg"><div class="nm">서월이</div><div class="role">배우는 자</div></div>
        <div class="c"><img src="../../../03_캐릭터/svg/낭할망.svg"><div class="nm">낭할망</div><div class="role">정답을 아는 자</div></div>
      </div>
      <div class="tagline">무뚝뚝한데 다정한, 제주식 위로</div>
    </div>
  </div>
  <div class="credit">제주어 감수: 제주어연구소 감수 예정 · 수익의 5%는 제주어 보존 활동에 쓰입니다 · ⓒ탐탐이와 친구들</div>
  <div class="bottom"><span>@tamnaground</span></div>
</div></body></html>
