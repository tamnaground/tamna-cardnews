<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="common.css">
<style>
  .tam{width:300px;height:300px;margin-top:4px;}
  .word{font-size:210px;font-weight:800;line-height:1;position:relative;display:inline-block;margin-top:6px;}
  .word .u{position:absolute;left:6%;right:6%;bottom:6px;height:16px;background:var(--orange);border-radius:8px;z-index:-1;}
  .word .fill{color:var(--yellow);-webkit-text-stroke:8px var(--ink);paint-order:stroke fill;}
  .mean{font-size:42px;font-weight:700;color:var(--orange);margin-top:26px;}
  .say{margin-top:26px;font-size:30px;font-weight:700;color:var(--ink);
    background:#fffdf7;border:3px solid var(--ink);border-radius:26px;padding:18px 30px;line-height:1.4;}
  .say .g{display:block;font-size:22px;font-weight:600;color:#8a7a63;margin-top:6px;}
</style></head>
<body><div class="card">
  <div class="top"><h1>오늘의 제주어</h1></div>
  <div class="body">
    <img class="corner tl" src="flower.svg"><img class="corner br" src="flower.svg">
    <div class="frame"></div>
    <div class="inner">
      <img class="tam" src="../../../03_캐릭터/svg/탐탐이.svg">
      <div class="word"><span class="fill">하영</span><span class="u"></span></div>
      <div class="mean">= 많이</div>
      <div class="say">"이 말, <b>하영</b> 써 봅주."
        <span class="g">이 말, 많이 써 봅시다. — 탐탐이</span>
      </div>
    </div>
  </div>
  <div class="credit">제주어 감수: 제주어연구소 감수 예정 · 수익의 5%는 제주어 보존 활동에 쓰입니다 · ⓒ탐탐이와 친구들</div>
  <div class="bottom"><span>@tamnaground</span></div>
</div></body></html>
