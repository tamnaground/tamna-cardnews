<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="common.css">
<style>
  .inner{padding:20px 30px;justify-content:flex-start;}
  .lede{font-size:27px;font-weight:800;color:var(--green);margin:2px 0 16px;}
  .lede b{color:var(--orange);}
  .grid4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:20px;width:100%;flex:1;}
  .panel{position:relative;background:#fffdf7;border:3px solid var(--ink);border-radius:22px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;}
  .panel .no{position:absolute;top:12px;left:14px;width:40px;height:40px;border-radius:50%;
    background:var(--orange);color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center;}
  .panel img{width:150px;height:150px;}
  .bub{background:var(--cream);border:3px solid var(--ink);border-radius:20px;
    padding:12px 18px;font-size:26px;font-weight:800;line-height:1.25;text-align:center;max-width:94%;}
  .bub .g{display:block;font-size:18px;font-weight:600;color:#8a7a63;margin-top:4px;}
  .bub .jw{color:var(--orange);}
  .p4 .bub{background:var(--green2);border-color:var(--green);}
</style></head>
<body><div class="card">
  <div class="top"><h1>탐탐이네 단막극</h1></div>
  <div class="body">
    <img class="corner tr" src="flower.svg">
    <div class="frame"></div>
    <div class="inner">
      <div class="lede">서월이의 <b>제주어 오해 소동</b> — 오늘의 말은 <b>'무사'</b></div>
      <div class="grid4">
        <div class="panel"><div class="no">1</div>
          <img src="file:///home/user/tamna-cardnews/탐탐이와친구들/03_캐릭터/svg/탐탐이.svg">
          <div class="bub"><span class="jw">"무사?"</span><span class="g">왜? — 탐탐이</span></div>
        </div>
        <div class="panel"><div class="no">2</div>
          <img src="file:///home/user/tamna-cardnews/탐탐이와친구들/03_캐릭터/svg/서월이.svg">
          <div class="bub">"그게 무슨 뜻이야?!"<span class="g">무사?! …군인? — 서월이</span></div>
        </div>
        <div class="panel"><div class="no">3</div>
          <img src="file:///home/user/tamna-cardnews/탐탐이와친구들/03_캐릭터/svg/낭할망.svg">
          <div class="bub"><span class="jw">"게메이~</span> '무사'는 '왜'."<span class="g">글쎄 말이야~ — 낭할망</span></div>
        </div>
        <div class="panel p4"><div class="no">4</div>
          <img src="file:///home/user/tamna-cardnews/탐탐이와친구들/03_캐릭터/svg/서월이.svg">
          <div class="bub">"아! '무사'는 '왜'! <span class="jw">기여?!</span>"<span class="g">맞지?! — 서월이</span></div>
        </div>
      </div>
    </div>
  </div>
  <div class="credit">제주어 감수: 제주어연구소 감수 예정 · 수익의 5%는 제주어 보존 활동에 · ⓒ탐탐이와 친구들</div>
  <div class="bottom"><span>@tamnaground</span></div>
</div></body></html>
