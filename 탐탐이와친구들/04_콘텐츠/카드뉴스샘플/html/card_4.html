<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="common.css">
<style>
  .top h1{font-size:46px;}
  .nang{width:290px;height:290px;margin-top:2px;}
  .word{font-size:96px;font-weight:800;color:var(--ink);line-height:1.1;margin-top:2px;}
  .word .fill{color:var(--green);}
  .mean{font-size:38px;font-weight:700;color:var(--orange);margin-top:14px;}
  .note{margin-top:24px;font-size:27px;font-weight:600;color:#5f5340;line-height:1.5;max-width:820px;}
  .note b{color:var(--green);font-weight:800;}
  .quote{margin-top:22px;font-size:25px;font-weight:700;color:var(--ink);
    background:var(--green2);border-radius:24px;padding:16px 28px;line-height:1.4;}
  .quote .g{display:block;font-size:19px;font-weight:600;color:#4e5a44;margin-top:5px;}
</style></head>
<body><div class="card">
  <div class="top"><h1>낭할망이 알려주는 진짜 제주어</h1></div>
  <div class="body">
    <img class="corner tl" src="flower.svg"><img class="corner br" src="flower.svg">
    <div class="frame"></div>
    <div class="inner">
      <img class="nang" src="../../../03_캐릭터/svg/낭할망.svg">
      <div class="word"><span class="fill">폭싹 속았수다</span></div>
      <div class="mean">= 수고하셨습니다</div>
      <div class="note">드라마로 <b>하영(많이)</b> 알려진 제주 인사. 그래도<br>뜻과 표기는 정확히 — 그게 말을 지키는 첫걸음이에요.</div>
      <div class="quote">"게메마씸. 나도 그 말, <b>하영</b> 그리웠수다."
        <span class="g">글쎄 말이에요. 나도 그 말이 많이 그리웠습니다. — 낭할망</span>
      </div>
    </div>
  </div>
  <div class="credit">제주어 감수: 제주어연구소 감수 예정 · 수익의 5%는 제주어 보존 활동에 쓰입니다 · ⓒ탐탐이와 친구들</div>
  <div class="bottom"><span>@tamnaground</span></div>
</div></body></html>
