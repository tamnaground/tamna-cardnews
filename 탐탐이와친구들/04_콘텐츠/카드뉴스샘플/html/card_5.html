<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="common.css">
<style>
  .inner{justify-content:flex-start;padding-top:30px;}
  .headline{font-size:38px;font-weight:800;line-height:1.35;margin-bottom:6px;}
  .headline b{color:var(--orange);}
  .flowerbox{margin:6px 0 4px;}
  .flowerbox svg{width:660px;height:280px;}
  .legend{display:flex;gap:26px;justify-content:center;margin:4px 0 14px;}
  .legend .it{display:flex;align-items:center;gap:9px;font-size:20px;font-weight:700;}
  .sw{width:26px;height:26px;border-radius:50%;border:3px solid var(--ink);}
  .desc{font-size:26px;font-weight:600;color:#5f5340;line-height:1.5;max-width:840px;}
  .desc b{color:var(--green);font-weight:800;}
  .chip{margin-top:20px;font-size:30px;font-weight:800;color:var(--ink);
    background:var(--yellow);border:3px solid var(--ink);border-radius:40px;padding:14px 34px;}
  .chip .g{font-size:22px;font-weight:600;color:#6d5f4c;margin-left:8px;}
  .cta{margin-top:18px;font-size:28px;font-weight:800;color:#fff;background:var(--orange);
    border-radius:40px;padding:14px 36px;}
</style></head>
<body><div class="card">
  <div class="top"><h1>같이 지켜요, 제주어</h1></div>
  <div class="body">
    <img class="corner tl" src="flower.svg"><img class="corner tr" src="flower.svg">
    <div class="frame"></div>
    <div class="inner">
      <div class="headline">댓글로 <b>제주어</b>를 따라 쓰면<br>나무 수호신의 <b>말의 새싹</b>이 자라요</div>
      <div class="flowerbox">
        <svg viewBox="0 0 640 270" xmlns="http://www.w3.org/2000/svg">
          <!-- 흙 밭 -->
          <path d="M40 214 Q40 196 62 196 L578 196 Q600 196 600 214 L600 236 Q600 254 578 254 L62 254 Q40 254 40 236 Z"
                fill="#B08D5F" stroke="#3E3226" stroke-width="4"/>
          <path d="M40 214 Q40 196 62 196 L578 196 Q600 196 600 214 Z" fill="#8F6F45" opacity="0.35"/>

          <!-- ① 시든 새싹 (잊혀가는 말) -->
          <g stroke="#3E3226" stroke-width="4" stroke-linejoin="round">
            <path d="M140 210 L146 156" fill="none" stroke-linecap="round"/>
            <path d="M146 176 Q120 172 112 150 Q138 150 146 176 Z" fill="#F5EDDF" stroke-dasharray="6 5"/>
            <path d="M146 170 Q172 162 182 142 Q156 142 146 170 Z" fill="#F5EDDF" stroke-dasharray="6 5"/>
          </g>

          <!-- ② 평상 새싹 (살아있는 말) -->
          <g stroke="#5C8A3C" stroke-width="4.5" stroke-linejoin="round">
            <path d="M320 208 L320 138" fill="none" stroke-linecap="round"/>
            <path d="M320 168 Q292 162 282 138 Q310 140 320 168 Z" fill="#7FA653"/>
            <path d="M320 160 Q348 154 358 130 Q330 132 320 160 Z" fill="#7FA653"/>
          </g>

          <!-- ③ 자라는 새싹 (오늘 살아난 말) — 발광 -->
          <circle cx="500" cy="120" r="72" fill="#7FA653" opacity="0.16"/>
          <circle cx="500" cy="120" r="50" fill="#FFCC5C" opacity="0.20"/>
          <g stroke="#5C8A3C" stroke-width="5" stroke-linejoin="round">
            <path d="M500 208 L500 96" fill="none" stroke-linecap="round"/>
            <path d="M500 150 Q464 142 452 112 Q488 116 500 150 Z" fill="#7FA653"/>
            <path d="M500 136 Q536 128 548 98 Q512 102 500 136 Z" fill="#7FA653"/>
            <path d="M500 116 Q486 96 490 70 Q510 84 500 116 Z" fill="#7FA653"/>
          </g>
          <!-- 반짝 -->
          <g fill="#FFCC5C" stroke="none">
            <circle cx="448" cy="72" r="5"/><circle cx="556" cy="88" r="4"/><circle cx="500" cy="46" r="4.5"/>
          </g>

          <!-- 성장 화살표 -->
          <path d="M198 172 L268 172" fill="none" stroke="#3E3226" stroke-width="4" stroke-linecap="round"/>
          <path d="M258 165 L270 172 L258 179" fill="none" stroke="#3E3226" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M378 158 L448 158" fill="none" stroke="#3E3226" stroke-width="4" stroke-linecap="round"/>
          <path d="M438 151 L450 158 L438 165" fill="none" stroke="#3E3226" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="legend">
        <div class="it"><span class="sw" style="background:#F5EDDF;border-style:dashed"></span>잊혀가는 말</div>
        <div class="it"><span class="sw" style="background:#7FA653"></span>살아있는 말</div>
        <div class="it"><span class="sw" style="background:#7FA653;box-shadow:0 0 0 4px #FFCC5C55"></span>오늘 살아난 말</div>
      </div>
      <div class="desc">한 마디 따라 쓰는 것도 <b>지키는 것</b>.<br>여러분이 따라 쓸 때마다 다음 화에서 새싹이 한 마디만큼 자라요.</div>
      <div class="chip">혼저옵서예<span class="g">어서 오세요</span></div>
      <div class="cta">댓글에 오늘의 한 마디를 따라 써 주세요</div>
    </div>
  </div>
  <div class="credit">제주어 감수: 제주어연구소 감수 예정 · 수익의 5%는 제주어 보존 활동에 쓰입니다 · ⓒ탐탐이와 친구들</div>
  <div class="bottom"><span>@tamnaground</span></div>
</div></body></html>
